name: Deploy to GitHub Pages

# Builds the PWA and publishes dist/ to GitHub Pages on every push to main.
# Because the lukebriscoe.github.io user site has a custom domain, this project
# site is served at https://lukebriscoe.com/what-can-i-do/ — hence the base path.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # App icons are generated (git-ignored), so recreate them before building.
      - run: npm run icons

      - name: Build
        run: npm run build -- --base=/what-can-i-do/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
